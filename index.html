<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área de Taller — Faros Mérida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🔦</div>
      <h1 class="gradient-text">Área de Taller</h1>
      <p>Faros &amp; Detailing Mérida</p>
    </div>

    <!-- Login con Google (admins) -->
    <button class="btn btn-google btn-block btn-lg" id="btn-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Ingresar con Google
    </button>

    <div class="login-divider">o ingresa con tu cuenta del taller</div>

    <!-- Login email/password (operadores) -->
    <div id="msg-error" class="alert alert-danger hidden"></div>

    <form id="form-login">
      <div class="form-group">
        <label class="form-label" for="email">Correo</label>
        <input class="form-control" type="email" id="email" placeholder="nombre@farosmerida.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-block btn-lg mt-2" type="submit" id="btn-login">
        Ingresar
      </button>
    </form>

    <p class="mt-3 text-center muted" style="font-size:.8rem;">
      ¿Cuenta nueva? Pide a un administrador que te registre.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
// Panel de debug temporal (solo visible cuando hay hash OAuth)
const _dbgEl = document.createElement('div');
_dbgEl.id = 'auth-debug';
_dbgEl.style = 'display:none;position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #fad149;color:#fad149;font:11px/1.6 monospace;padding:8px 12px;max-height:150px;overflow:auto;z-index:9999;';
document.body.appendChild(_dbgEl);
function _dbg(msg) { _dbgEl.style.display='block'; _dbgEl.innerHTML += msg + '<br>'; console.log('[auth]', msg); }

// Inicio del flujo de autenticación
(async () => {
  const hash = window.location.hash;

  if (hash && hash.includes('access_token')) {
    _dbg('Hash detectado con access_token');

    const params = new URLSearchParams(hash.substring(1));
    const access_token  = params.get('access_token');
    const refresh_token = params.get('refresh_token');

    _dbg('access_token: ' + (access_token ? access_token.slice(0,30)+'...' : 'NULL'));
    _dbg('refresh_token: ' + (refresh_token || 'NULL'));

    if (access_token && refresh_token) {
      _dbg('Llamando sb.auth.setSession()...');
      const { data, error } = await sb.auth.setSession({ access_token, refresh_token });
      _dbg('setSession → error: ' + (error ? error.message : 'ninguno'));
      _dbg('setSession → session: ' + (data?.session ? data.session.user.email : 'null'));

      if (data?.session) {
        history.replaceState(null, '', window.location.pathname);
        _dbg('Sesión OK. Buscando perfil...');
        const perfil = await getPerfil(data.session.user.id);
        _dbg('Perfil: ' + (perfil ? JSON.stringify({rol:perfil.rol,aprobado:perfil.aprobado}) : 'null'));
        if (perfil) { doRedirect(perfil); } else { _dbg('ERROR: perfil no encontrado'); }
        return;
      }
    } else {
      _dbg('ERROR: falta access_token o refresh_token');
    }
  } else {
    // Sin hash: sesión normal
    redirectByRole();
  }
})();

// Google OAuth
document.getElementById('btn-google').addEventListener('click', async () => {
  const btn = document.getElementById('btn-google');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Conectando...';
  hideError();

  const redirectTo = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo }
  });

  if (error) {
    showError('Google: ' + error.message);
    btn.disabled = false;
    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Ingresar con Google';
  }
  // si no hay error, el navegador redirige — no hace falta re-habilitar el botón
});

// Email + password
document.getElementById('form-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Ingresando...';
  hideError();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    showError(error.message === 'Invalid login credentials'
      ? 'Correo o contraseña incorrectos.'
      : error.message);
    btn.disabled = false;
    btn.innerHTML = 'Ingresar';
    return;
  }

  await redirectByRole();
});

// (La sesión ya se maneja en redirectByRole con waitForSession)

function showError(msg) {
  const el = document.getElementById('msg-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideError() {
  document.getElementById('msg-error').classList.add('hidden');
}
</script>
</body>
</html>
